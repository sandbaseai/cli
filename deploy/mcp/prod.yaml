apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbase-mcp
  namespace: sandbase
  labels:
    app: sandbase-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbase-mcp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sandbase-mcp
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
        - name: mcp
          image: sgccr.ccs.tencentyun.com/sandbase/mcp:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SANDBASE_BASE_URL
              value: "https://api.sandbase.ai"
            - name: SANDBASE_MCP_TOOLSETS
              value: "models,mcp,chat,run,account,agent,session,environment,skill,embed,upload"
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sandbase-mcp
  namespace: sandbase
  labels:
    app: sandbase-mcp
spec:
  type: NodePort
  selector:
    app: sandbase-mcp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sandbase-mcp-ingress
  namespace: sandbase
  annotations:
    kubernetes.io/ingress.class: qcloud
    kubernetes.io/ingress.existLbId: lb-9cr62q4u
    ingress.cloud.tencent.com/enable-group: "true"
    kubernetes.io/ingress.rule-mix: "true"
    kubernetes.io/ingress.extensiveParameters: '{"ConnectTimeout":60000,"SendTimeout":300000,"ReadTimeout":300000}'
    kubernetes.io/ingress.http-rules: |-
      [
        {"host":"mcp.sandbase.ai","path":"/","backend":{"serviceName":"sandbase-mcp","servicePort":"8080"}}
      ]
    kubernetes.io/ingress.https-rules: |-
      [
        {"host":"mcp.sandbase.ai","path":"/","backend":{"serviceName":"sandbase-mcp","servicePort":"8080"}}
      ]
spec:
  tls:
    - hosts:
        - mcp.sandbase.ai
      secretName: sandbase-tls-cert
  rules:
    - host: mcp.sandbase.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sandbase-mcp
                port:
                  number: 8080
